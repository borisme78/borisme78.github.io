<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Exchange</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container mt-5">
      <div class="card shadow-sm p-4">
        <h2 class="mb-4">Currency Exchange</h2>

        <div class="mb-3">
          <label for="currency" class="form-label">Currency</label>
          <select id="currency" class="form-select">
            <option value="">Choose currency</option>
            
          </select>
        </div>

        <div class="mb-3">
          <label for="startDate" class="form-label">Select a specific start day</label>
          <input type="date" id="startDate" class="form-control" />
          <label for="endDate" class="form-label">Select a specific end day</label>
          <input type="date" id="endDate" class="form-control" />
        </div>

        <button id="btnRate" class="btn btn-primary">Get Rate</button>
      </div>

      <div id="data" class="mt-4"></div>
      <canvas id="currencyChart"></canvas>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
  </body>
</html>
